services:
  dsp-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: dsp-server
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./configs/server.json:/app/configs/server.json:ro
    cap_add:
      - NET_ADMIN
    privileged: true
    devices:
      - /dev/net/tun:/dev/net/tun

  dsp-panel:
    build:
      context: .
      dockerfile: Dockerfile.panel
    container_name: dsp-panel
    restart: unless-stopped
    depends_on:
      - dsp-server
    ports:
      - "2053:2053/tcp"
    volumes:
      - ./configs/panel.json:/app/configs/panel.json:ro
      - ./data:/app/data
